<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: WARFARE</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --yellow: #fff000; --pink: #ff007c; --blue: #00e5ff; --purple: #7000ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none; }
        #game-screen { width: 100%; height: 100dvh; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* 背景：静かに回転するサンバースト */
        #bg {
            position: absolute; width: 200vmax; height: 200vmax; top: 50%; left: 50%;
            margin: -100vmax; background: conic-gradient(from 0deg, #0a0a0a 0deg 15deg, #000 15deg 30deg);
            z-index: 0; animation: rotate 30s linear infinite; pointer-events: none;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ランキングボード */
        #leaderboard {
            position: absolute; left: 10px; top: 20px; width: 160px; z-index: 100;
            background: rgba(0,0,0,0.85); border: 2px solid var(--blue); border-radius: 10px; padding: 10px;
        }
        .rank-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; border-bottom: 1px solid #222; }
        .rank-item.is-me { color: var(--yellow); font-weight: bold; }

        /* 攻撃対象パネル */
        #target-panel {
            position: absolute; right: 10px; top: 20px; width: 140px; z-index: 100;
            background: #111; border: 3px solid var(--pink); border-radius: 15px; padding: 10px; text-align: center;
        }
        .target-score { font-size: 18px; color: var(--pink); display: block; margin-bottom: 8px; font-family: monospace; }

        /* メインコア（クリック対象） */
        #core-container { margin-top: 35dvh; text-align: center; z-index: 10; cursor: pointer; }
        #score-display { 
            font-size: 20vw; color: var(--yellow); filter: drop-shadow(0 0 15px var(--yellow)); 
            line-height: 0.8; transition: transform 0.05s; 
        }
        #mps-display { color: var(--blue); font-size: 5vw; margin-top: 15px; opacity: 0.8; }

        /* フッターボタン */
        #footer { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 100; }
        .btn { background: var(--purple); color: white; border: 3px solid white; padding: 15px 30px; border-radius: 50px; font-weight: 900; box-shadow: 0 6px 0 #4a00a8; cursor: pointer; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #4a00a8; }
        .btn-steal { background: var(--pink); box-shadow: 0 6px 0 #b30057; }

        /* ポップアップエフェクト */
        .particle { position: absolute; pointer-events: none; font-weight: 900; animation: p-out 0.5s ease-out forwards; white-space: nowrap; }
        @keyframes p-out { 0% { transform: scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; } }

        /* ショップ画面 */
        #shop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; border: 10px solid var(--purple); }
        .shop-item { 
            background: #111; border: 2px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; filter: grayscale(1); opacity: 0.5; transition: 0.2s;
        }
        .shop-item.can-buy { filter: grayscale(0); opacity: 1; border-color: var(--blue); cursor: pointer; }
    </style>
</head>
<body>

<div id="game-screen">
    <div id="bg"></div>

    <div id="leaderboard">
        <div style="font-size:12px; color:var(--blue); margin-bottom:8px;">ONLINE RANKING</div>
        <div id="rank-list"></div>
    </div>

    <div id="target-panel">
        <span style="font-size:10px">TARGET: #1</span>
        <span class="target-score" id="top-val">0</span>
        <button class="btn btn-steal" style="padding:10px; font-size:14px; width:100%" onclick="stealFromTop()">STEAL!!</button>
    </div>

    <div id="core-container" onmousedown="clickCore(event)" ontouchstart="clickCore(event)">
        <div id="score-display">0</div>
        <div id="mps-display">0 /s</div>
    </div>

    <div id="footer">
        <button class="btn" onclick="openShop()">UPGRADES</button>
    </div>
</div>

<div id="shop">
    <h1 style="color:var(--purple); margin:0 0 20px 0;">UPGRADES</h1>
    <div id="shop-items" style="flex:1; overflow-y:auto"></div>
    <button class="btn" style="background:#fff; color:#000;" onclick="closeShop()">BACK</button>
</div>

<script>
    // --- 【重要】ここにリーダーのFirebase情報を貼り付け ---
    const firebaseConfig = {
        apiKey: "AIzaSy...",
  authDomain: "your-project-id.firebaseapp.com",
  databaseURL: "https://your-project-id-default-rtdb.firebaseio.com",
  projectId: "your-project-id",
  storageBucket: "your-project-id.appspot.com",
  messagingSenderId: "1234567890",
  appId: "1:1234567890:web:abcdef123456"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const myId = "USR-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    let score = 0;
    let mps = 0;
    let topPlayer = { id: "", score: 0 };
    const items = [
        { name: "Digit Miner", cost: 15, mps: 1, count: 0 },
        { name: "Data Siphon", cost: 150, mps: 10, count: 0 },
        { name: "Logic Core", cost: 2000, mps: 85, count: 0 },
        { name: "Empire Rig", cost: 25000, mps: 700, count: 0 }
    ];

    function syncScore() {
        db.ref('users/' + myId).set({ score: Math.floor(score), mps: mps });
    }

    db.ref('users').orderByChild('score').limitToLast(10).on('value', (snap) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = '';
        let players = [];
        snap.forEach(child => players.unshift({ id: child.key, ...child.val() }));
        
        topPlayer = players[0] || { id: "", score: 0 };
        document.getElementById('top-val').innerText = topPlayer.score.toLocaleString();

        players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `rank-item ${p.id === myId ? 'is-me' : ''}`;
            div.innerHTML = `<span>#${i+1} ${p.id}</span><span>${p.score.toLocaleString()}</span>`;
            list.appendChild(div);
        });
    });

    function clickCore(e) {
        if(e.type === 'touchstart') e.preventDefault();
        
        const display = document.getElementById('score-display');
        display.style.transform = "scale(1.1)";
        setTimeout(() => display.style.transform = "scale(1)", 50);

        let power = 1 + Math.floor(mps * 0.2);
        score += power;
        
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        spawnParticle(x, y, `+${power}`, 'var(--yellow)');
        updateUI();
    }

    function stealFromTop() {
        if (score < 100 || topPlayer.id === myId) return;
        let cost = Math.floor(score * 0.1); 
        score -= cost;
        let damage = cost * 10; 
        let reward = Math.floor(damage * 0.3); 

        db.ref('users/' + topPlayer.id + '/score').transaction(current => (current || 0) - damage);
        score += reward;
        
        document.body.style.background = '#300';
        setTimeout(() => document.body.style.background = '#000', 100);
        spawnParticle(window.innerWidth/2, window.innerHeight/2, `STEAL +${reward}!!`, 'var(--pink)');
        updateUI();
    }

    function spawnParticle(x, y, txt, color) {
        const p = document.createElement('div');
        p.className = 'particle'; p.innerText = txt;
        p.style.left = x + 'px'; p.style.top = y + 'px'; p.style.color = color;
        p.style.setProperty('--tx', (Math.random()-0.5)*150+'px');
        p.style.setProperty('--ty', (Math.random()-1)*150+'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 500);
    }

    function updateUI() {
        document.getElementById('score-display').innerText = Math.floor(score).toLocaleString();
        document.getElementById('mps-display').innerText = mps.toLocaleString() + " /s";
    }

    function openShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = '';
        items.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `shop-item ${score >= item.cost ? 'can-buy' : ''}`;
            div.onclick = () => {
                if(score >= items[i].cost) {
                    score -= items[i].cost;
                    items[i].count++;
                    mps += items[i].mps;
                    items[i].cost = Math.floor(items[i].cost * 1.5);
                    openShop();
                    updateUI();
                }
            };
            div.innerHTML = `<div><b>${item.name}</b><br>$${item.cost.toLocaleString()}</div><div>${item.count}</div>`;
            container.appendChild(div);
        });
        document.getElementById('shop').style.display = 'flex';
    }

    function closeShop() { document.getElementById('shop').style.display = 'none'; }

    setInterval(() => {
        score += (mps / 10);
        syncScore();
        updateUI();
    }, 100);
</script>
</body>
</html>
