<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: EMPIRE</title>
    <style>
        :root {
            --pop-yellow: #fff000;
            --pop-pink: #ff007c;
            --pop-blue: #00e5ff;
            --pop-purple: #7000ff;
            --bg: #000000;
        }
        body {
            margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Arial Black', sans-serif;
            user-select: none; -webkit-user-select: none; touch-action: none; color: white;
        }

        /* 背景：サンバースト（速度可変） */
        #sunburst {
            position: absolute; top: 50%; left: 50%; width: 200vmax; height: 200vmax;
            margin-left: -100vmax; margin-top: -100vmax;
            background: conic-gradient(from 0deg, transparent 0deg 10deg, rgba(255, 255, 255, 0.05) 10deg 20deg);
            background-size: 20deg 20deg; animation: rotateSun 20s linear infinite;
            pointer-events: none; z-index: 1;
        }
        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* UI 上部 */
        #header { position: absolute; top: 20px; width: 92%; display: flex; justify-content: space-between; z-index: 110; pointer-events: none; }
        .ui-pill { background: rgba(255,255,255,0.1); border: 2px solid white; padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 900; pointer-events: auto; }

        /* メイン統計 */
        #stats-container { margin-top: 12dvh; text-align: center; z-index: 50; pointer-events: none; }
        #score-display { font-size: 15vw; font-weight: 900; color: var(--pop-yellow); filter: drop-shadow(0 0 20px var(--pop-yellow)); margin: 0; line-height: 1; }
        #mps-display { font-size: 5vw; color: var(--pop-blue); -webkit-text-stroke: 1px black; font-weight: 900; margin-top: 10px; }

        /* 中央のコア・ナンバー */
        #core-wrapper { width: 70vmin; height: 70vmin; position: relative; cursor: pointer; z-index: 100; display: flex; justify-content: center; align-items: center; }
        #core-visual { font-size: 30vmin; filter: drop-shadow(0 0 30px var(--pop-pink)); transition: 0.1s; }
        
        .pop-hit { animation: coreHit 0.1s ease-out; }
        @keyframes coreHit { 0% { transform: scale(1); } 50% { transform: scale(0.9) rotate(-5deg); } 100% { transform: scale(1); } }

        /* パーティクル & テキスト */
        .particle { position: absolute; pointer-events: none; font-weight: 900; z-index: 200; animation: particleOut 0.6s ease-out forwards; }
        @keyframes particleOut { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(2); opacity: 0; } }

        /* 下部ボタン */
        #footer { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; z-index: 110; }
        #shop-trigger {
            background: var(--pop-pink); color: white; border: 4px solid white; padding: 20px 60px; border-radius: 15px;
            font-size: 28px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 0 #b30057; transition: 0.1s;
        }
        #shop-trigger:active { transform: translateY(5px); box-shadow: 0 5px 0 #b30057; }

        /* ショップオーバーレイ */
        #shop-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 500; display: none; flex-direction: column; align-items: center; border: 10px solid var(--pop-purple); box-sizing: border-box; }
        #shop-header { width: 100%; padding: 30px 0; text-align: center; background: var(--pop-purple); }
        #shop-list { width: 100%; overflow-y: auto; flex: 1; padding: 20px 0; }
        
        .shop-item {
            background: #222; border: 2px solid #444; margin: 10px 20px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; border-radius: 12px; transition: 0.2s;
        }
        .shop-item.can-buy { border-color: var(--pop-blue); background: #2a2a2a; }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-size: 20px; color: var(--pop-blue); font-weight: 900; }
        .item-cost { font-size: 16px; color: var(--pop-yellow); }
        .item-count { font-size: 40px; color: #333; font-weight: 900; }
        .can-buy .item-count { color: #555; }

        #close-shop { margin: 20px 0 30px; background: white; color: black; border: none; padding: 15px 80px; border-radius: 10px; font-size: 20px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="sunburst"></div>

    <div id="header">
        <div class="ui-pill" id="era-display">ERA: 0</div>
        <div class="ui-pill">RANK: --</div>
    </div>

    <div id="stats-container">
        <div id="score-display">0</div>
        <div id="mps-display">0 /s</div>
    </div>

    <div id="core-wrapper">
        <div id="core-visual">#</div>
    </div>

    <div id="footer">
        <button id="shop-trigger" onclick="toggleShop(true)">ARMORY / SHOP</button>
    </div>

    <div id="shop-overlay">
        <div id="shop-header">
            <h1 style="margin:0; font-size: 40px;">ARMORY</h1>
            <div id="shop-current-score" style="font-size: 20px;">0 NUMBERS</div>
        </div>
        <div id="shop-list"></div>
        <button id="close-shop" onclick="toggleShop(false)">RETURN</button>
    </div>

    <script>
        let score = 0;
        let era = 0;
        let lastClickTime = Date.now();

        const items = [
            { name: "Digit Miner", cost: 15, mps: 1, count: 0 },
            { name: "Data Siphon", cost: 150, mps: 8, count: 0 },
            { name: "Logic Core", cost: 1000, mps: 45, count: 0 },
            { name: "Neural Link", cost: 12000, mps: 260, count: 0 },
            { name: "Quantum Rig", cost: 150000, mps: 1400, count: 0 },
            { name: "Empire Server", cost: 2000000, mps: 9500, count: 0 },
            { name: "Void Processor", cost: 50000000, mps: 70000, count: 0 }
        ];

        function initShop() {
            const container = document.getElementById('shop-list');
            container.innerHTML = '';
            items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.id = `item-${i}`;
                div.onclick = () => buyItem(i);
                div.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-eff">+${item.mps.toLocaleString()}/s</span>
                        <span class="item-cost" id="cost-${i}">$ ${item.cost.toLocaleString()}</span>
                    </div>
                    <div class="item-count" id="count-${i}">0</div>
                `;
                container.appendChild(div);
            });
        }

        function toggleShop(show) {
            document.getElementById('shop-overlay').style.display = show ? 'flex' : 'none';
            updateUI();
        }

        function handleAction(e) {
            if (e.type === 'touchstart' && e.cancelable) e.preventDefault();
            
            const core = document.getElementById('core-visual');
            core.classList.remove('pop-hit');
            void core.offsetWidth;
            core.classList.add('pop-hit');

            let clickPower = 1 + Math.floor(getTotalMps() * 0.1);
            score += clickPower;

            const x = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
            const y = (e.type === 'touchstart') ? e.touches[0].clientY : e.clientY;
            
            createDigitParticle(x, y, clickPower);
            updateUI();
            
            // 背景加速
            lastClickTime = Date.now();
            document.getElementById('sunburst').style.animationDuration = '2s';
        }

        function createDigitParticle(x, y, val) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = `+${val.toLocaleString()}`;
            p.style.color = Math.random() > 0.5 ? 'var(--pop-yellow)' : 'var(--pop-blue)';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
            p.style.setProperty('--ty', (Math.random() - 1.0) * 300 + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function getTotalMps() { return items.reduce((sum, item) => sum + (item.mps * item.count), 0); }

        function buyItem(id) {
            if (score >= items[id].cost) {
                score -= items[id].cost;
                items[id].count++;
                items[id].cost = Math.floor(items[id].cost * 1.35);
                updateUI();
            }
        }

        function updateUI() {
            const s = Math.floor(score);
            document.getElementById('score-display').innerText = s.toLocaleString();
            document.getElementById('shop-current-score').innerText = s.toLocaleString() + " NUMBERS";
            document.getElementById('mps-display').innerText = `${getTotalMps().toLocaleString()} /s`;
            
            // 桁に応じた称号
            if (score > 1000000) era = Math.floor(Math.log10(score)) - 5;
            document.getElementById('era-display').innerText = `ERA: ${era}`;

            items.forEach((item, i) => {
                const el = document.getElementById(`item-${i}`);
                document.getElementById(`cost-${i}`).innerText = `$ ${item.cost.toLocaleString()}`;
                document.getElementById(`count-${i}`).innerText = item.count;
                if (score >= item.cost) el.classList.add('can-buy');
                else el.classList.remove('can-buy');
            });
        }

        // 自動増加 & 背景速度減衰
        setInterval(() => {
            score += (getTotalMps() / 10);
            if (Date.now() - lastClickTime > 2000) {
                document.getElementById('sunburst').style.animationDuration = '20s';
            }
            updateUI();
        }, 100);

        initShop();
        const wrapper = document.getElementById('core-wrapper');
        wrapper.addEventListener('touchstart', handleAction, { passive: false });
        wrapper.addEventListener('mousedown', handleAction);
        updateUI();
    </script>
</body>
</html>
