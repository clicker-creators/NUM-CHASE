<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: OVERDRIVE</title>
    <style>
        :root {
            --pop-yellow: #fff000;
            --pop-pink: #ff007c;
            --pop-blue: #00e5ff;
            --pop-purple: #7000ff;
        }
        body {
            margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden;
            background: #000; color: white;
            font-family: 'Arial Black', sans-serif;
            user-select: none; -webkit-user-select: none; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.1s;
        }

        /* 背景：サンバースト（連打で加速・変色） */
        #sunburst {
            position: absolute; top: 50%; left: 50%; width: 300vmax; height: 300vmax;
            margin-left: -150vmax; margin-top: -150vmax;
            background: conic-gradient(from 0deg, transparent 0deg 15deg, rgba(255, 255, 255, 0.05) 15deg 30deg);
            background-size: 30deg 30deg; animation: rotateSun 20s linear infinite;
            pointer-events: none; z-index: 1; transition: filter 0.3s;
        }
        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* フラッシュ演出用 */
        #flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
        }

        /* 統計表示 */
        #mps-display { 
            margin-top: 10dvh; font-size: 8vw; color: var(--pop-blue); 
            text-shadow: 0 0 20px var(--pop-blue); z-index: 50; 
        }

        /* 中央のコア・ナンバー（インパクトの核） */
        #core-wrapper { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; text-align: center; cursor: pointer; z-index: 100;
        }
        #score-display { 
            display: inline-block; font-size: 25vw; font-weight: 900; 
            color: var(--pop-yellow); filter: drop-shadow(0 0 30px var(--pop-yellow));
            line-height: 1; transition: transform 0.05s, font-size 0.1s;
        }
        
        /* パーティクル（飛び散る数字） */
        .particle { 
            position: absolute; pointer-events: none; font-weight: 900; z-index: 200; 
            animation: particleOut 0.6s cubic-bezier(0.12, 0, 0.39, 0) forwards; 
            font-size: 5vw;
        }
        @keyframes particleOut { 
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; } 
            100% { transform: translate(var(--tx), var(--ty)) scale(2) rotate(var(--tr)); opacity: 0; } 
        }

        /* ショップ：買えないものは灰色 */
        #footer { position: absolute; bottom: 40px; z-index: 110; }
        #shop-trigger {
            background: var(--pop-pink); color: white; border: 5px solid white; padding: 20px 60px; border-radius: 100px;
            font-size: 32px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 0 #b30057;
        }

        #shop-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; 
            border: 10px solid var(--pop-purple); box-sizing: border-box;
        }
        #shop-header { padding: 40px; text-align: center; background: var(--pop-purple); }
        #shop-list { flex: 1; overflow-y: auto; padding: 20px 0; }
        
        .shop-item {
            background: #1a1a1a; border: 4px solid #333; margin: 15px 25px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; border-radius: 20px;
            filter: grayscale(1) brightness(0.5); transition: 0.2s; pointer-events: none;
        }
        .shop-item.can-buy { 
            filter: grayscale(0) brightness(1); border-color: var(--pop-blue); 
            pointer-events: auto; cursor: pointer;
        }
        .shop-item:active { transform: scale(0.95); }

        .item-name { font-size: 24px; color: var(--pop-blue); font-weight: 900; }
        .item-cost { font-size: 18px; color: var(--pop-yellow); display: block; }
        .item-count { font-size: 40px; color: rgba(255,255,255,0.1); font-weight: 900; }

        #close-shop { margin: 30px; background: white; color: black; border: none; padding: 20px; border-radius: 15px; font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div id="sunburst"></div>

    <div id="mps-display">0 /s</div>

    <div id="core-wrapper">
        <div id="score-display">0</div>
    </div>

    <div id="footer">
        <button id="shop-trigger" onclick="toggleShop(true)">GET POWER</button>
    </div>

    <div id="shop-overlay">
        <div id="shop-header">
            <h1 style="margin:0; font-size: 40px;">UPGRADE</h1>
            <div id="shop-current-score" style="font-size: 24px; color: var(--pop-yellow);">0</div>
        </div>
        <div id="shop-list"></div>
        <button id="close-shop" onclick="toggleShop(false)">CLOSE</button>
    </div>

    <script>
        let score = 0;
        let lastDigitCount = 0;
        let combo = 0;
        let comboTimer;

        const items = [
            { name: "Auto Clicker", cost: 15, mps: 1, count: 0 },
            { name: "Turbo Engine", cost: 100, mps: 8, count: 0 },
            { name: "Mega Miner", cost: 1100, mps: 45, count: 0 },
            { name: "Nuclear Core", cost: 12000, mps: 380, count: 0 },
            { name: "God Server", cost: 130000, mps: 2500, count: 0 },
            { name: "Void Eater", cost: 1400000, mps: 18000, count: 0 }
        ];

        function initShop() {
            const container = document.getElementById('shop-list');
            container.innerHTML = '';
            items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.id = `item-${i}`;
                div.onclick = () => buyItem(i);
                div.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-cost" id="cost-${i}">$ ${item.cost.toLocaleString()}</span>
                    </div>
                    <div class="item-count" id="count-${i}">0</div>
                `;
                container.appendChild(div);
            });
        }

        function toggleShop(show) {
            document.getElementById('shop-overlay').style.display = show ? 'flex' : 'none';
            updateUI();
        }

        function handleAction(e) {
            if (e.type === 'touchstart' && e.cancelable) e.preventDefault();
            
            // 1. スクリーンシェイク
            document.body.style.transform = `translate(${(Math.random()-0.5)*15}px, ${(Math.random()-0.5)*15}px)`;
            setTimeout(() => document.body.style.transform = 'translate(0,0)', 50);

            // 2. 背景加速とヒートアップ
            const sun = document.getElementById('sunburst');
            sun.style.animationDuration = '0.5s';
            sun.style.filter = `hue-rotate(${Math.random()*360}deg) brightness(2)`;
            
            // 3. スコア計算
            let clickPower = 1 + Math.floor(getTotalMps() * 0.15);
            score += clickPower;

            // 4. 中央数字の巨大化リアクション
            const display = document.getElementById('score-display');
            display.style.transform = 'scale(1.2) rotate('+(Math.random()-0.5)*10+'deg)';
            setTimeout(() => display.style.transform = 'scale(1) rotate(0deg)', 80);

            const x = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
            const y = (e.type === 'touchstart') ? e.touches[0].clientY : e.clientY;
            
            createParticle(x, y, clickPower);
            checkMilestone();
            updateUI();
        }

        function createParticle(x, y, val) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = `+${val.toLocaleString()}`;
            p.style.color = Math.random() > 0.5 ? 'var(--pop-yellow)' : 'white';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.setProperty('--tx', (Math.random() - 0.5) * 400 + 'px');
            p.style.setProperty('--ty', (Math.random() - 1.2) * 400 + 'px');
            p.style.setProperty('--tr', (Math.random() - 0.5) * 100 + 'deg');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function checkMilestone() {
            const currentDigits = Math.floor(Math.log10(score || 1));
            if (currentDigits > lastDigitCount) {
                // 桁が上がった時のフラッシュ！
                const f = document.getElementById('flash');
                f.style.opacity = '1';
                setTimeout(() => f.style.opacity = '0', 200);
                lastDigitCount = currentDigits;
            }
        }

        function getTotalMps() { return items.reduce((sum, item) => sum + (item.mps * item.count), 0); }

        function buyItem(id) {
            if (score >= items[id].cost) {
                score -= items[id].cost;
                items[id].count++;
                items[id].cost = Math.floor(items[id].cost * 1.4);
                updateUI();
            }
        }

        function updateUI() {
            const rounded = Math.floor(score);
            document.getElementById('score-display').innerText = rounded.toLocaleString();
            document.getElementById('shop-current-score').innerText = rounded.toLocaleString();
            document.getElementById('mps-display').innerText = `${getTotalMps().toLocaleString()} /s`;
            
            items.forEach((item, i) => {
                const el = document.getElementById(`item-${i}`);
                document.getElementById(`cost-${i}`).innerText = `$ ${item.cost.toLocaleString()}`;
                document.getElementById(`count-${i}`).innerText = item.count;
                if (score >= item.cost) el.classList.add('can-buy');
                else el.classList.remove('can-buy');
            });
        }

        // 自動増加 & 背景の冷却
        setInterval(() => {
            score += (getTotalMps() / 10);
            const sun = document.getElementById('sunburst');
            const currentSpeed = parseFloat(sun.style.animationDuration);
            if (currentSpeed < 20) {
                sun.style.animationDuration = (currentSpeed + 0.5) + 's';
            }
            updateUI();
        }, 100);

        initShop();
        const core = document.getElementById('core-wrapper');
        core.addEventListener('touchstart', handleAction, { passive: false });
        core.addEventListener('mousedown', handleAction);
        updateUI();
    </script>
</body>
</html>
