<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wi-Fi Clicker: Mega Network</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.6);
            --bg-dark: #050a14;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden;
            background: radial-gradient(circle at center, #102a45 0%, var(--bg-dark) 100%);
            display: flex; flex-direction: column;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white; user-select: none; -webkit-user-select: none; touch-action: none;
        }

        /* スコア表示エリア */
        #top-panel {
            padding: 20px; text-align: center; flex-shrink: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }
        #data-display { font-size: 42px; font-weight: 900; color: var(--primary-blue); text-shadow: 0 0 20px var(--accent-glow); }
        #bps-display { font-size: 16px; color: #87CEEB; margin-top: 5px; opacity: 0.8; }

        /* メインのクリックエリア */
        #click-zone {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; min-height: 200px;
        }
        #wifi-target {
            width: 50vmin; height: 50vmin; cursor: pointer; transition: transform 0.05s;
        }
        #wifi-target:active { transform: scale(0.92); }

        /* アップグレードエリア（ここを大幅に使いやすく！） */
        #shop-panel {
            height: 45%; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px); border-top: 2px solid var(--primary-blue);
            overflow-y: auto; padding: 15px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 10px;
        }

        .upgrade-item {
            display: flex; align-items: center; background: var(--card-bg);
            padding: 12px 20px; border-radius: 15px; border: 1px solid #333;
            transition: 0.2s; cursor: pointer; flex-shrink: 0;
        }
        .upgrade-item:active { transform: scale(0.98); background: rgba(255,255,255,0.15); }
        .upgrade-item.disabled { opacity: 0.4; filter: grayscale(1); }

        .u-info { flex: 1; }
        .u-name { font-size: 16px; font-weight: bold; color: var(--primary-blue); display: block; }
        .u-desc { font-size: 11px; color: #bbb; }
        
        .u-stats { text-align: right; }
        .u-cost { font-size: 16px; font-weight: bold; color: #ffd700; display: block; }
        .u-level { font-size: 12px; color: #888; }

        /* パーティクル */
        .pop {
            position: absolute; pointer-events: none; font-weight: 900;
            color: white; animation: popUp 0.6s ease-out forwards;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="top-panel">
        <div id="data-display">0.00 MB</div>
        <div id="bps-display">Auto: 0 Mbps | Power: 1.0</div>
    </div>

    <div id="click-zone">
        <div id="wifi-target">
            <svg viewBox="0 0 24 24" style="width:100%; height:100%; filter: drop-shadow(0 0 15px var(--accent-glow));">
                <circle cx="12" cy="18" r="2" fill="white" />
                <path id="w-1" d="M8.5 14.5a5 5 0 0 1 7 0" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" />
                <path id="w-2" d="M5 11a10 10 0 0 1 14 0" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" />
                <path id="w-3" d="M2 7.5a15 15 0 0 1 20 0" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" />
            </svg>
        </div>
    </div>

    <div id="shop-panel">
        <!-- 施設たちがここに並びます -->
    </div>

    <script>
        let totalData = 0;
        let clickPower = 1.0;
        let autoPower = 0;

        const upgradeData = [
            { id: 'tap', name: '高性能チップ', desc: '1クリックの通信量が増加', baseCost: 15, power: 0.8, type: 'click' },
            { id: 'router', name: '最新ルーター', desc: '自動通信を開始', baseCost: 50, power: 1.5, type: 'auto' },
            { id: 'cable', name: '海底光ケーブル', desc: '大規模な通信を確立', baseCost: 500, power: 8.0, type: 'auto' },
            { id: 'satellite', name: '通信衛星', desc: '宇宙からデータを送信', baseCost: 5000, power: 50.0, type: 'auto' },
            { id: 'server', name: 'データセンター', desc: '圧倒的な処理能力', baseCost: 50000, power: 450.0, type: 'auto' },
            { id: 'ai', name: '量子通信AI', desc: '通信の概念が変わる', baseCost: 1000000, power: 3500.0, type: 'auto' }
        ];

        let save = {
            data: 0,
            levels: { tap: 0, router: 0, cable: 0, satellite: 0, server: 0, ai: 0 }
        };

        const shopPanel = document.getElementById('shop-panel');

        // ショップアイテムを生成
        function initShop() {
            upgradeData.forEach(u => {
                const item = document.createElement('div');
                item.className = 'upgrade-item';
                item.id = `item-${u.id}`;
                item.onclick = () => buyUpgrade(u.id);
                item.innerHTML = `
                    <div class="u-info">
                        <span class="u-name">${u.name}</span>
                        <span class="u-desc">${u.desc}</span>
                    </div>
                    <div class="u-stats">
                        <span class="u-cost" id="cost-${u.id}">0 MB</span>
                        <span class="u-level" id="lv-${u.id}">Lv.0</span>
                    </div>
                `;
                shopPanel.appendChild(item);
            });
            updateUI();
        }

        function buyUpgrade(id) {
            const u = upgradeData.find(x => x.id === id);
            const cost = getCost(u);
            if (totalData >= cost) {
                totalData -= cost;
                save.levels[id]++;
                if (u.type === 'click') clickPower += u.power;
                else autoPower += u.power;
                updateUI();
            }
        }

        function getCost(u) {
            return Math.floor(u.baseCost * Math.pow(1.2, save.levels[u.id]));
        }

        function formatData(num) {
            if (num < 1024) return num.toFixed(2) + " MB";
            if (num < 1048576) return (num / 1024).toFixed(2) + " GB";
            return (num / 1048576).toFixed(2) + " TB";
        }

        function updateUI() {
            document.getElementById('data-display').innerText = formatData(totalData);
            document.getElementById('bps-display').innerText = `Auto: ${autoPower.toFixed(1)} Mbps | Power: ${clickPower.toFixed(1)}`;

            upgradeData.forEach(u => {
                const cost = getCost(u);
                const item = document.getElementById(`item-${u.id}`);
                document.getElementById(`cost-${u.id}`).innerText = formatData(cost);
                document.getElementById(`lv-${u.id}`).innerText = "Lv." + save.levels[u.id];
                
                if (totalData >= cost) item.classList.remove('disabled');
                else item.classList.add('disabled');
            });

            // アイコン点灯
            document.getElementById('w-1').setAttribute('stroke', autoPower > 0 ? varColor() : '#444');
            document.getElementById('w-2').setAttribute('stroke', autoPower > 50 ? varColor() : '#444');
            document.getElementById('w-3').setAttribute('stroke', autoPower > 500 ? varColor() : '#444');
        }

        function varColor() { return "#00d2ff"; }

        function handleAction(e) {
            totalData += clickPower;
            createPop(e);
            updateUI();
        }

        function createPop(e) {
            const p = document.createElement('div');
            p.className = 'pop';
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.innerText = "+" + clickPower.toFixed(1);
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        // 自動加算
        setInterval(() => {
            if (autoPower > 0) {
                totalData += (autoPower / 10);
                updateUI();
            }
        }, 100);

        const target = document.getElementById('wifi-target');
        target.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(e); }, {passive: false});
        target.addEventListener('mousedown', (e) => { if(!('ontouchstart' in window)) handleAction(e); });

        initShop();
    </script>
</body>
</html>
