<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: WARFARE</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --neon-pink: #ff007c; --neon-blue: #00e5ff; --neon-yellow: #fff000; }
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; touch-action: manipulation; }
        
        /* メインレイアウト */
        #game-container { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* スコア表示 */
        #score-panel { text-align: center; margin-bottom: 20px; }
        #score-val { font-size: 3rem; color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); font-weight: bold; }
        #mps-val { font-size: 1rem; color: var(--neon-blue); }

        /* コアボタン */
        #core-btn {
            width: 180px; height: 180px; border-radius: 50%; background: transparent;
            border: 5px solid var(--neon-pink); color: var(--neon-pink); font-size: 1.5rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 0 20px var(--neon-pink); transition: 0.1s; outline: none; margin: 20px 0;
        }
        #core-btn:active { transform: scale(0.9); background: var(--neon-pink); color: white; }

        /* ランキング */
        #leaderboard { width: 100%; max-width: 400px; background: rgba(20,20,20,0.9); border: 1px solid var(--neon-blue); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .rank-item.is-me { color: var(--neon-yellow); border-left: 3px solid var(--neon-yellow); padding-left: 5px; }
        .attack-btn { background: var(--neon-pink); border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }

        /* アップグレードショップ */
        #shop { width: 100%; max-width: 400px; display: grid; gap: 10px; }
        .shop-item { background: #1a1a1a; border: 1px solid #444; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .shop-item:hover { border-color: var(--neon-yellow); }
        .shop-item.disabled { opacity: 0.5; cursor: not-allowed; }
        .item-info b { color: var(--neon-blue); }

        /* 警告通知 */
        #alert { position: fixed; top: 10%; color: var(--neon-pink); font-weight: bold; font-size: 1.2rem; display: none; z-index: 100; text-shadow: 0 0 5px red; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="alert">!! UNDER ATTACK !!</div>

    <div id="score-panel">
        <div id="score-val">0</div>
        <div id="mps-val">MPS: 0</div>
    </div>

    <button id="core-btn" onclick="clickCore()">CHARGE</button>

    <div id="leaderboard">
        <div style="color: var(--neon-blue); margin-bottom: 10px; border-bottom: 1px solid;">ONLINE TARGETS</div>
        <div id="rank-list">読み込み中...</div>
    </div>

    <div id="shop">
        <div id="shop-items"></div>
    </div>
</div>

<script>
    // --- FIREBASE 設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAYnC_bHIPYElG8zjbL-7vEIH4rWSA7hbw",
        authDomain: "my-warfare-game-fa3db.firebaseapp.com",
        databaseURL: "https://my-warfare-game-fa3db-default-rtdb.firebaseio.com",
        projectId: "my-warfare-game-fa3db",
        storageBucket: "my-warfare-game-fa3db.firebasestorage.app",
        messagingSenderId: "408551026184",
        appId: "1:408551026184:web:85e80b61c8110ce3d6abbd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ユーザー情報
    let myId = localStorage.getItem('warfare_v2_id') || "X-" + Math.random().toString(36).substring(2, 6).toUpperCase();
    localStorage.setItem('warfare_v2_id', myId);

    let score = 0;
    let mps = 0;
    let items = [
        { id: 0, name: "CPU Miner", cost: 15, power: 1, count: 0 },
        { id: 1, name: "Data Siphon", cost: 100, power: 8, count: 0 },
        { id: 2, name: "Logic Bomb", cost: 500, power: 45, count: 0 }
    ];

    // クリック処理
    function clickCore() {
        score += 1 + Math.floor(mps * 0.1);
        updateUI();
        saveToDB();
    }

    // 施設購入
    function buyItem(idx) {
        let item = items[idx];
        if (score >= item.cost) {
            score -= item.cost;
            item.count++;
            mps += item.power;
            item.cost = Math.floor(item.cost * 1.5);
            updateUI();
            saveToDB();
            renderShop();
        }
    }

    // 攻撃処理 (Transactionを使用)
    function launchAttack(targetId) {
        let attackCost = Math.floor(score * 0.2); // 所持金の20%を消費
        if (attackCost < 50) return alert("エネルギーが足りません (最小50必要)");

        score -= attackCost;
        let damage = attackCost * 3; // コストの3倍のダメージ

        // 相手のスコアを減らす
        db.ref('users/' + targetId + '/score').transaction((current) => {
            return Math.max(0, (current || 0) - damage);
        });

        // 奪い取りボーナス
        score += Math.floor(damage * 0.2);
        saveToDB();
        alert(targetId + " に大ダメージを与え、一部を奪い取った！");
    }

    // データベース保存
    function saveToDB() {
        db.ref('users/' + myId).update({
            score: Math.floor(score),
            mps: mps
        });
    }

    // UI更新
    function updateUI() {
        document.getElementById('score-val').innerText = Math.floor(score).toLocaleString();
        document.getElementById('mps-val').innerText = "MPS: " + mps.toLocaleString();
    }

    function renderShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = items.map((item, i) => `
            <div class="shop-item ${score < item.cost ? 'disabled' : ''}" onclick="buyItem(${i})">
                <div class="item-info"><b>${item.name}</b><br>Cost: ${item.cost} / +${item.power}s</div>
                <div>Lv.${item.count}</div>
            </div>
        `).join('');
    }

    // 1秒ごとの自動増加
    setInterval(() => {
        score += (mps / 10);
        updateUI();
        renderShop(); // スコアに合わせて買えるかチェック
    }, 100);

    // 5秒ごとにDB同期
    setInterval(saveToDB, 5000);

    // ランキング監視
    db.ref('users').orderByChild('score').limitToLast(10).on('value', (snap) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        let players = [];
        snap.forEach(child => { players.unshift({ id: child.key, ...child.val() }); });

        players.forEach((p, idx) => {
            // 被弾検知
            if (p.id === myId && p.score < score - 10) {
                document.getElementById('alert').style.display = 'block';
                setTimeout(() => document.getElementById('alert').style.display = 'none', 2000);
            }
            if (p.id === myId) score = p.score;

            const div = document.createElement('div');
            div.className = `rank-item ${p.id === myId ? 'is-me' : ''}`;
            div.innerHTML = `
                <span>#${idx+1} ${p.id} (${Math.floor(p.score).toLocaleString()})</span>
                ${p.id !== myId ? `<button class="attack-btn" onclick="launchAttack('${p.id}')">STEAL</button>` : ' (YOU)'}
            `;
            list.appendChild(div);
        });
    });

    renderShop();
</script>
</body>
</html>
